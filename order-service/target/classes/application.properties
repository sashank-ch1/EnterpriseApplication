spring.application.name=order-service
server.port=8085
spring.datasource.url=jdbc:mysql://localhost:3306/orders
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
# --- Eureka Client Config ---
# The URL of your Eureka Server dashboard
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# Register using IP instead of hostname (recommended for local Docker/Testing)
eureka.instance.prefer-ip-address=true

# --- Feign Client Config ---
# Optional: Set timeouts so one slow service doesn't crash yours
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000