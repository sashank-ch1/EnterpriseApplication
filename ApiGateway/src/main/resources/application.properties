spring.application.name=ApiGateway
# Connect to your existing Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3306/usercredentials_db
spring.datasource.username=root
spring.datasource.password=Sashank123@
#spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Gateway-specific discovery settings
# This keeps the Gateway ready to auto-route as soon as you add new services
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
# Product Service
spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=lb://products-service # use lowercase service id to match spring.application.name // Edited
spring.cloud.gateway.routes[0].predicates[0]=Path=/products/**

# Order Service
spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://order-service # Edited
spring.cloud.gateway.routes[1].predicates[0]=Path=/orders/**

# Inventory Service
spring.cloud.gateway.routes[2].id=inventory-service
spring.cloud.gateway.routes[2].uri=lb://inventory-service # Edited
spring.cloud.gateway.routes[2].predicates[0]=Path=/inventory/**

# Payment Service
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://payment-service # Edited
spring.cloud.gateway.routes[3].predicates[0]=Path=/payment/**
